name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv python install 3.12

      - run: uv sync --group dev

      # Generate SVG screenshots for the site.
      - name: Generate screenshots
        run: uv run python demo/screenshot.py

      # Assemble the site: docs/ is the base, add generated assets.
      - name: Assemble site
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp -r demo/screenshots _site/screenshots
          # Include demo.cast if it has been committed.
          if [ -f demo/demo.cast ]; then
            cp demo/demo.cast _site/demo.cast
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
