# Pre-commit configuration for textual-emoji-picker (standalone package).
#
# Install:
#   uv run pre-commit install --install-hooks
#
# Hooks shell out to `uv run` so tool versions match the lockfile.

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff (lint)
        entry: uv run --directory packages/textual-emoji-picker ruff check --fix
        language: system
        types_or: [python, pyi]
        files: ^packages/textual-emoji-picker/
        require_serial: true

      - id: ruff-format
        name: ruff (format)
        entry: uv run --directory packages/textual-emoji-picker ruff format
        language: system
        types_or: [python, pyi]
        files: ^packages/textual-emoji-picker/
        require_serial: true

      - id: mypy
        name: mypy (strict)
        entry: uv run --directory packages/textual-emoji-picker mypy
        language: system
        types_or: [python, pyi]
        files: ^packages/textual-emoji-picker/
        pass_filenames: false
        require_serial: true

      - id: pytest
        name: pytest
        entry: uv run --directory packages/textual-emoji-picker pytest
        language: system
        pass_filenames: false
        files: ^packages/textual-emoji-picker/
        stages: [pre-push]
